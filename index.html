</head>
<body>

<div class="card">
    <!-- Настройки интерфейса -->
    <div class="settings-row">
        <span id="lang_label">Язык / Language:</span>
        <select id="lang_select">
            <option value="ru" selected>Русский</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="settings-row">
        <span id="theme_label">Стиль интерфейса:</span>
        <select id="theme_select">
            <option value="purple" selected>Фиолетовый</option>
            <option value="red">Тёмно-красный</option>
            <option value="cyberpunk">Киберпанк</option>
        </select>
    </div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

    <!-- Основная форма -->
    <h2 id="main_title">Создай Персонажа 😈</h2>
    <input type="text" id="name" placeholder="Имя персонажа...">
    <textarea id="prompt" rows="4" placeholder="Его характер и повадки..."></textarea>
    <button id="send_btn">Готово (Создать)</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Переводы текстов
    const translations = {
        ru: {
            theme_label: "Стиль интерфейса:",
            main_title: "Создай Персонажа 😈",
            name_placeholder: "Имя персонажа...",
            prompt_placeholder: "Его характер и повадки...",
            btn_text: "Готово (Создать)",
            alert_text: "Заполни все поля, бро!"
        },
        en: {
            theme_label: "Interface Style:",
            main_title: "Create a Character 😈",
            name_placeholder: "Character name...",
            prompt_placeholder: "Character traits and behavior...",
            btn_text: "Ready (Create)",
            alert_text: "Please fill in all fields, bro!"
        }
    };

    let currentLang = "ru";

    // Логика переключения языков
    document.getElementById("lang_select").addEventListener("change", function(e) {
        currentLang = e.target.value;
        updateLanguage();
    });

    // Логика переключения цветовых тем
    document.getElementById("theme_select").addEventListener("change", function(e) {
        document.documentElement.setAttribute("data-theme", e.target.value);
    });

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById("theme_label").innerText = t.theme_label;
        document.getElementById("main_title").innerText = t.main_title;
        document.getElementById("name").placeholder = t.name_placeholder;
        document.getElementById("prompt").placeholder = t.prompt_placeholder;
        document.getElementById("send_btn").innerText = t.btn_text;
    }

    // Отправка данных в бота
    let btn = document.getElementById("send_btn");
    btn.addEventListener("click", function() {
        let name = document.getElementById("name").value;
        let prompt = document.getElementById("prompt").value;

        if(!name || !prompt) {
            alert(translations[currentLang].alert_text);
            return;
        }

        let data = {
            char_name: name,
            char_prompt: prompt
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    });
</script>
</body>
</html>
