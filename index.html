<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtyMind AI - Конструктор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 90vh;
        }
        .card {
            background: #1a1a1e;
            border: 2px solid #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        h2 { color: #ba55d3; margin-top: 0; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #26262b;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #ba55d3;
            outline: none;
        }
        button {
            background: linear-gradient(45deg, #8a2be2, #ba55d3);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(186, 85, 211, 0.4);
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <h2>Создай Персонажа 😈</h2>
    <input type="text" id="name" placeholder="Имя персонажа...">
    <textarea id="prompt" rows="4" placeholder="Его характер и повадки..."></textarea>
    <button id="send_btn">Готово (Создать)</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let btn = document.getElementById("send_btn");

    btn.addEventListener("click", function() {
        let name = document.getElementById("name").value;
        let prompt = document.getElementById("prompt").value;

        if(!name || !prompt) {
            alert("Заполни все поля, бро!");
            return;
        }

        let data = {
            char_name: name,
            char_prompt: prompt
        };

        tg.sendData(JSON.stringify(data));
        tg.close();
    });
</script>

</body>
</html>
